name: Daily Stock Screener

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 7:00 AM UTC Mon–Fri (8:00 Spain winter / 9:00 summer)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screener:
    runs-on: ubuntu-latest

    # Give workflow permission to push last_results.json back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas lxml html5lib

      - name: Run screener
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEND_TO:        ${{ secrets.SEND_TO }}
        run: python screener.py

      - name: Save results for tomorrow's comparison
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_results.json
          git diff --staged --quiet || git commit -m "Update last_results.json [$(date +%Y-%m-%d)]"
          git push
